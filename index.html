<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>

<body>

<div id="auth-gate" class="auth-gate">
  <div class="auth-box">
    <img src="logo.png" alt="">

    <input type="password" id="auth-pw" placeholder="비밀번호" autocomplete="current-password">

  </div>
</div>

<header>

  </aside>

  <span class="powered">Powered by TW.graphy</span>
</footer>

<script>
/* --- 비밀번호 게이트 --- */
(function () {
  const AUTH_HASH = '8780096448d6ec87cc3fae794c892fd14d4f35fe4501fd9a7186c2cd9b1de339';
  const AUTH_KEY = 'duru-auth-v1';
  const gate = document.getElementById('auth-gate');
  const pw = document.getElementById('auth-pw');
  const btn = document.getElementById('auth-btn');
  const err = document.getElementById('auth-err');

  if (localStorage.getItem(AUTH_KEY) === '1') {
    gate.remove();
    return;
  }

  document.body.style.overflow = 'hidden';

  async function sha256(text) {
    const buf = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash))
      .map(b => b.toString(16).padStart(2, '0'))
      .join('');
  }

  async function submit() {
    const h = await sha256(pw.value);
    if (h === AUTH_HASH) {
      localStorage.setItem(AUTH_KEY, '1');
      gate.remove();
      document.body.style.overflow = '';
    } else {
      err.textContent = '비밀번호가 올바르지 않습니다.';
      pw.value = '';
      pw.focus();
    }
  }

  btn.addEventListener('click', submit);
  pw.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
  setTimeout(() => pw.focus(), 50);
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script>
marked.use({
  tokenizer: {
    del(src) {
      const match = /^~~(?=\S)([\s\S]*?\S)~~/.exec(src);
      if (match) {
        return {
          type: 'del',
          raw: match[0],
          text: match[1],
          tokens: this.lexer.inlineTokens(match[1])
        };
      }
    }
  }
});

const FILES = [
  'weekly_plan_2026_03_week1-2.md',
  'weekly_plan_2026_03_week3-4.md',
  'weekly_plan_2026_03_week4.md',
  'weekly_plan_2026_04_week1.md',
  'weekly_plan_2026_04_week2.md',
  'weekly_plan_2026_04_week3-4.md',
];

const DEPARTMENTS = [
  '교장·교감', '교무기획부', '교육과정부', '교육과정기획부',
  '평가지원부', '평생교육부', '체육부', '진로진학상담부',
  '학생생활안전부', '미래역량강화부', '교육정보부', '학년부',
  '행정실', '안내사항',
];

function parseFile(f) {
  const m = f.match(/weekly_plan_(\d{4})_(\d{2})_week(\d+(?:-\d+)?)\.md/);
  if (!m) return null;
  return {
    file: f,
    year: +m[1],
    month: +m[2],
    weeks: m[3],
    label: `${m[1]}학년도 ${+m[2]}월 ${m[3].replace('-', '~')}주`,
    sortKey: +m[1] * 10000 + +m[2] * 100 + +m[3].split('-')[0],
  };
}

const plans = FILES.map(parseFile).filter(Boolean).sort((a, b) => a.sortKey - b.sortKey);

const searchInput = document.getElementById('search');
const deptFilter = document.getElementById('dept-filter');
const planList = document.getElementById('plan-list');
const content = document.getElementById('content');

DEPARTMENTS.forEach(d => {
  const opt = document.createElement('option');
  opt.value = d;
  opt.textContent = d;
  deptFilter.appendChild(opt);
});

// 오늘의 일정 카드 항목 클릭 → 해당 본문 행으로 스크롤
content.addEventListener('click', (e) => {
  const li = e.target.closest('[data-scroll-to]');
  if (!li) return;
  const rowId = li.getAttribute('data-scroll-to');

  // 필터로 가려져 있을 수 있으니 초기화 후 재렌더
  if (searchInput.value || deptFilter.value) {
    searchInput.value = '';
    deptFilter.value = '';
    applyFilters();
  }

  const target = content.querySelector(`tr[data-row-id="${rowId}"]`);
  if (!target) return;
  target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  target.classList.remove('row-flash');
  void target.offsetWidth; // 애니메이션 재시작 트릭
  target.classList.add('row-flash');
});

let current = null;
let currentHTML = '';

plans.forEach(p => {
  const li = document.createElement('li');
  li.innerHTML = `<span class="dot"></span><span>${p.label}</span>`;
  li.addEventListener('click', () => load(p));
  p.el = li;
  planList.appendChild(li);
});

function findCurrentPlan(date = new Date()) {
  const y = date.getFullYear();
  const m = date.getMonth() + 1;
  const d = date.getDate();
  const wk = Math.min(5, Math.ceil(d / 7));
  const candidates = plans.filter(p => {
    if (p.year !== y || p.month !== m) return false;
    const parts = p.weeks.split('-').map(Number);
    return parts.length === 1
      ? parts[0] === wk
      : wk >= parts[0] && wk <= parts[1];
  });
  if (candidates.length) {
    return candidates.sort((a, b) =>
      (a.weeks.includes('-') ? 2 : 1) - (b.weeks.includes('-') ? 2 : 1))[0];
  }
  const key = y * 10000 + m * 100 + wk;
  const past = plans.filter(p => p.sortKey <= key);
  return past.length ? past[past.length - 1] : plans[plans.length - 1];
}

async function load(plan, scrollSidebar = true) {
  if (current) current.el.classList.remove('active');
  plan.el.classList.add('active');
  current = plan;
  if (scrollSidebar) {
    plan.el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
  try {
    const res = await fetch(plan.file);
    if (!res.ok) throw new Error(res.status);
    const md = await res.text();
    const rendered = marked.parse(md);
    const normalized = normalizeDates(rendered, plan.month);
    const beautified = beautifyCells(normalized);
    currentHTML = wrapWithMeta(beautified, plan);
    applyFilters();
  } catch (e) {
    content.innerHTML = `<p class="empty" style="color:#dc2626">파일 로드 실패: ${plan.file} (${e.message})</p>`;
  }
}

// 표 셀 안 날짜 표기를 "M.DD.(요일)" / "M.DD." 형식으로 통일
// MD 원본은 그대로, 렌더링 단계에서만 보정
//
// 처리 패턴:
//   1) "M월 DD일(요일)"   → "M.DD.(요일)"
//   2) "M월 DD일"         → "M.DD."
//   3) "M. DD.(요일)"     → "M.DD.(요일)"  (공백 제거)
//   4) "M. DD."           → "M.DD."        (공백 제거)
//   5) "M/DD"             → "M.DD."
//   6) "DD(요일)"         → "{기준월}.DD.(요일)"  (일자만 있을 때, 파일명의 월 사용)
//   7) "DD일 + 시간/방향"  → "{기준월}.DD."        (예: "20일 오후", "20일 부터")
function normalizeDates(html, defaultMonth) {
  if (!defaultMonth) return html;
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const walker = document.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, null);
  const textNodes = [];
  let n;
  while ((n = walker.nextNode())) textNodes.push(n);

  const validDay = (d) => { const x = +d; return x >= 1 && x <= 31; };
  const validMonth = (m) => { const x = +m; return x >= 1 && x <= 12; };

  for (const node of textNodes) {
    let text = node.textContent;

    // 1. "M월 DD일(요일)" → "M.DD.(요일)"
    text = text.replace(
      /(?<![0-9])(\d{1,2})월\s*(\d{1,2})일\s*\(\s*([월화수목금토일])\s*\)/g,
      (m, mo, d, w) => (validMonth(mo) && validDay(d)) ? `${+mo}.${d}.(${w})` : m
    );
    // 2. "M월 DD일" → "M.DD."
    text = text.replace(
      /(?<![0-9])(\d{1,2})월\s*(\d{1,2})일/g,
      (m, mo, d) => (validMonth(mo) && validDay(d)) ? `${+mo}.${d}.` : m
    );
    // 3. "M. DD.(요일)" → "M.DD.(요일)"  (공백 제거)
    text = text.replace(
      /(?<![0-9.])(\d{1,2})\.\s*(\d{1,2})\.?\s*\(\s*([월화수목금토일])\s*\)/g,
      (m, mo, d, w) => (validMonth(mo) && validDay(d)) ? `${+mo}.${d}.(${w})` : m
    );
    // 4. "M. DD." (공백 있음) → "M.DD."
    text = text.replace(
      /(?<![0-9.])(\d{1,2})\.\s+(\d{1,2})\.(?![0-9])/g,
      (m, mo, d) => (validMonth(mo) && validDay(d)) ? `${+mo}.${d}.` : m
    );
    // 5. "M/DD" → "M.DD."
    text = text.replace(
      /(?<![0-9\/])(\d{1,2})\/(\d{1,2})(?![0-9\/])/g,
      (m, mo, d) => (validMonth(mo) && validDay(d)) ? `${+mo}.${d}.` : m
    );
    // 6. "DD(요일)" → "{defaultMonth}.DD.(요일)"
    text = text.replace(
      /(?<![0-9.])(\d{1,2})\s*\(\s*([월화수목금토일])\s*\)/g,
      (m, d, w) => validDay(d) ? `${defaultMonth}.${d}.(${w})` : m
    );
    // 7. "DD일 + 시간/방향" → "{defaultMonth}.DD."
    text = text.replace(
      /(?<![0-9])(\d{1,2})일(?=\s*(?:오전|오후|아침|점심|저녁|밤|새벽|부터|까지|이후|이전|~|\d+시))/g,
      (m, d, offset, full) => {
        const before = full.substring(Math.max(0, offset - 3), offset);
        if (/월\s*$/.test(before)) return m;
        return validDay(d) ? `${defaultMonth}.${d}.` : m;
      }
    );

    if (text !== node.textContent) node.textContent = text;
  }
  return doc.body.innerHTML;
}

// 표 셀 안의 "-로 시작하는 줄들"을 자동으로 <ul><li> 불릿 리스트로 변환
// MD 원본은 그대로 두고 렌더링 단계에서만 시각적으로 개선
function beautifyCells(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const cells = doc.querySelectorAll('tbody td');
  cells.forEach(td => {
    // 첫 번째 컬럼(부서명)은 건너뜀
    if (td.cellIndex === 0) return;
    const inner = td.innerHTML.trim();
    if (!inner) return;

    // <br> 기준으로 나눠서 각 조각이 '-' 로 시작하는지 검사
    const parts = inner.split(/<br\s*\/?>/i).map(s => s.trim()).filter(s => s);
    if (parts.length < 2) return;

    const dashCount = parts.filter(p => /^-/.test(p)).length;
    // 조각 대부분이 '-' 로 시작해야 리스트로 변환
    if (dashCount < parts.length - 1 || dashCount < 2) return;

    const lis = parts.map(p => {
      const cleaned = p.replace(/^-\s*/, '').trim();
      return cleaned ? `<li>${cleaned}</li>` : '';
    }).filter(Boolean).join('');
    td.innerHTML = `<ul class="cell-list">${lis}</ul>`;
  });
  return doc.body.innerHTML;
}

function wrapWithMeta(html, plan) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const h1 = doc.querySelector('h1');
  const titleText = h1 ? h1.textContent : plan.label;
  if (h1) h1.remove();

  // 표 행에 ID 부여 (오늘 일정 카드에서 클릭 시 스크롤 타겟)
  doc.querySelectorAll('tbody tr').forEach((tr, idx) => {
    tr.setAttribute('data-row-id', `row-${idx}`);
  });

  // 오늘의 일정 카드 생성
  const todayCard = buildTodayCard(doc.body);

  const body = doc.body.innerHTML;
  return `
    <h1>${titleText}</h1>
    <div class="meta-bar">
      <span class="chip">${plan.year}학년도</span>
      <span>·</span>
      <span>${plan.month}월 ${plan.weeks.replace('-', '~')}주차 업무 계획</span>
    </div>
    ${todayCard}
    ${body}
  `;
}

// 텍스트에서 한국어 날짜 패턴(4.21 / 4. 21. / 4.21(화) / 4월 21일) 추출
function findDates(text) {
  const dates = [];
  const reA = /(?<![0-9])(\d{1,2})\.\s*(\d{1,2})\.?(?:\s*\(\s*[월화수목금토일]\s*\))?(?![0-9])/g;
  const reB = /(?<![0-9])(\d{1,2})월\s*(\d{1,2})일(?![0-9])/g;
  for (const re of [reA, reB]) {
    let m;
    while ((m = re.exec(text)) !== null) {
      const mo = parseInt(m[1], 10);
      const dy = parseInt(m[2], 10);
      if (mo >= 1 && mo <= 12 && dy >= 1 && dy <= 31) {
        dates.push({ month: mo, day: dy, start: m.index, end: m.index + m[0].length });
      }
    }
  }
  return dates.sort((a, b) => a.start - b.start);
}

// 텍스트에 오늘 날짜가 (단일 날짜 또는 ~로 구분된 범위 안에) 포함되는지
function isItemToday(text, todayMonth, todayDay) {
  const dates = findDates(text);
  if (dates.length === 0) return false;
  if (dates.some(d => d.month === todayMonth && d.day === todayDay)) return true;
  for (let i = 0; i < dates.length - 1; i++) {
    const between = text.substring(dates[i].end, dates[i + 1].start);
    if (/~/.test(between)) {
      const t = todayMonth * 100 + todayDay;
      const a = dates[i].month * 100 + dates[i].day;
      const b = dates[i + 1].month * 100 + dates[i + 1].day;
      if (t >= a && t <= b) return true;
    }
  }
  return false;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function buildTodayCard(bodyEl) {
  const now = new Date();
  const dow = now.getDay(); // 0=일, 6=토
  const month = now.getMonth() + 1;
  const day = now.getDate();
  const dowKor = ['일','월','화','수','목','금','토'][dow];
  const dateStr = `${month}월 ${day}일 ${dowKor}요일`;

  // 주말은 일정 없음
  if (dow === 0 || dow === 6) {
    return `<div class="today-card today-card--empty">📅 오늘 (${dateStr}) 해당 일정 없음</div>`;
  }

  // 본문에서 오늘 매칭 항목 추출
  const items = [];
  bodyEl.querySelectorAll('tbody tr').forEach(tr => {
    const tds = tr.querySelectorAll('td');
    if (tds.length < 2) return;
    const dept = tds[0].textContent.replace(/\s+/g, ' ').trim();
    const cell = tds[1];
    const rowId = tr.getAttribute('data-row-id');

    const lis = cell.querySelectorAll('li');
    if (lis.length > 0) {
      lis.forEach(li => {
        const text = li.textContent.replace(/\s+/g, ' ').trim();
        if (text && isItemToday(text, month, day)) {
          items.push({ dept, text, rowId });
        }
      });
    } else {
      // <ul> 변환 안 된 셀: <br> 단위로 분할
      cell.innerHTML.split(/<br\s*\/?>/i).forEach(part => {
        const txt = part.replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
        if (txt && isItemToday(txt, month, day)) {
          items.push({ dept, text: txt, rowId });
        }
      });
    }
  });

  if (items.length === 0) {
    return `<div class="today-card today-card--empty">📅 오늘 (${dateStr}) 해당 일정 없음</div>`;
  }

  const itemsHtml = items.map(it => `
    <li data-scroll-to="${it.rowId}" title="클릭하면 본문으로 이동">
      <span class="today-dept">${escapeHtml(it.dept)}</span>
      <span class="today-text">${escapeHtml(it.text)}</span>
    </li>
  `).join('');

  return `
    <div class="today-card">
      <div class="today-header">📅 오늘 (${dateStr}) 일정 요약</div>
      <ul class="today-list">${itemsHtml}</ul>
      <div class="today-note">날짜가 명시된 항목만 자동 추출 · 항목 클릭 시 본문 위치로 이동</div>
    </div>
  `;
}

function applyFilters() {
  content.innerHTML = currentHTML;
  const q = searchInput.value.trim();
  const dept = deptFilter.value;
  const rows = content.querySelectorAll('table tbody tr');
  let visibleCount = 0;
  rows.forEach(tr => {
    const tds = tr.querySelectorAll('td');
    if (tds.length < 2) return;
    const deptText = tds[0].textContent.trim();
    const rowText = tr.textContent;
    const matchDept = !dept || deptText.includes(dept);
    const matchSearch = !q || rowText.toLowerCase().includes(q.toLowerCase());
    const show = matchDept && matchSearch;
    tr.classList.toggle('hidden', !show);
    if (show) visibleCount++;
  });
  if (q) highlight(q);
  highlightDates(content);
  if (rows.length > 0 && visibleCount === 0) {
    const msg = document.createElement('p');
    msg.className = 'empty';
    msg.textContent = '검색/필터 조건에 해당하는 항목이 없습니다.';
    content.appendChild(msg);
  }
}

function highlight(q) {
  const ql = q.toLowerCase();
  const walk = (node) => {
    if (node.nodeType === 3) {
      const text = node.textContent;
      const lower = text.toLowerCase();
      const idx = lower.indexOf(ql);
      if (idx >= 0) {
        const before = text.slice(0, idx);
        const match = text.slice(idx, idx + q.length);
        const after = text.slice(idx + q.length);
        const frag = document.createDocumentFragment();
        if (before) frag.appendChild(document.createTextNode(before));
        const mark = document.createElement('mark');
        mark.textContent = match;
        frag.appendChild(mark);
        const afterNode = document.createTextNode(after);
        frag.appendChild(afterNode);
        node.parentNode.replaceChild(frag, node);
        walk(afterNode);
      }
    } else if (node.nodeType === 1 && !['MARK', 'SCRIPT', 'STYLE'].includes(node.tagName)) {
      [...node.childNodes].forEach(walk);
    }
  };
  walk(content);
}

function highlightDates(root) {
  const now = new Date();
  const todayMonth = now.getMonth() + 1;
  const todayDay = now.getDate();
  const patterns = [
    { re: /(\d{1,2})\.\s*(\d{1,2})\.?(?:\s*\(\s*[월화수목금토일]\s*\))?/g, mIdx: 1, dIdx: 2 },
    { re: /(\d{1,2})월\s*(\d{1,2})일/g, mIdx: 1, dIdx: 2 }
  ];
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode: (node) => {
      const p = node.parentElement;
      if (!p) return NodeFilter.FILTER_REJECT;
      if (p.closest('.date-hl')) return NodeFilter.FILTER_REJECT;
      if (['SCRIPT', 'STYLE', 'H1'].includes(p.tagName)) return NodeFilter.FILTER_REJECT;
      if (p.classList && p.classList.contains('meta-bar')) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes = [];
  let n;
  while ((n = walker.nextNode())) nodes.push(n);
  nodes.forEach(textNode => {
    const text = textNode.nodeValue;
    const matches = [];
    patterns.forEach(p => {
      p.re.lastIndex = 0;
      let m;
      while ((m = p.re.exec(text))) {
        matches.push({
          start: m.index,
          end: m.index + m[0].length,
          text: m[0],
          month: parseInt(m[p.mIdx], 10),
          day: parseInt(m[p.dIdx], 10)
        });
      }
    });
    if (!matches.length) return;
    matches.sort((a, b) => a.start - b.start || b.end - a.end);
    const clean = [];
    let cursor = 0;
    for (const m of matches) {
      if (m.start >= cursor) { clean.push(m); cursor = m.end; }
    }
    const frag = document.createDocumentFragment();
    let last = 0;
    clean.forEach(m => {
      if (m.start > last) frag.appendChild(document.createTextNode(text.slice(last, m.start)));
      const span = document.createElement('span');
      const isToday = m.month === todayMonth && m.day === todayDay;
      span.className = isToday ? 'date-hl date-hl-today' : 'date-hl';
      span.textContent = m.text;
      frag.appendChild(span);
      last = m.end;
    });
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    textNode.parentNode.replaceChild(frag, textNode);
  });
}

searchInput.addEventListener('input', () => { if (current) applyFilters(); });
deptFilter.addEventListener('change', () => { if (current) applyFilters(); });
document.getElementById('today-btn').addEventListener('click', () => {
  const p = findCurrentPlan();
  if (p) load(p);
});

if (plans.length) load(findCurrentPlan());
